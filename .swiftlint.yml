disabled_rules:
  - todo
  - trailing_comma
  # We deliberately use `String(decoding:as:UTF8.self)` for streaming
  # byte → text decoding because it substitutes `U+FFFD` for invalid
  # sequences. The failable `String(bytes:encoding:)` would return `nil`
  # on malformed bytes, which we do not want.
  - optional_data_string_conversion
  # Conflicts with SwiftFormat's `--wraparguments before-first` line
  # wrapping. When a typed closure parameter (e.g.
  # `(cont: CheckedContinuation<Void, Error>) in`) would push the
  # opening brace line past our column budget, wrapping the parameter
  # onto its own line is the right call.
  - closure_parameter_position

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - sorted_first_last
  - closure_spacing
  - contains_over_first_not_nil
  - convenience_type
  - discouraged_object_literal
  - empty_collection_literal
  - empty_string
  - fatal_error_message
  - identical_operands
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

analyzer_rules:
  - explicit_self
  - unused_import

excluded:
  - .build
  - .swiftpm
  - .claude # Claude Code harness dir (agent worktrees + local settings), untracked
  - DerivedData
  - mushclient
  - mudlet
  - iterm2
  - aardwolfclientpackage
  # Build-only tooling (one-off icon generator), not shipped code.
  - scripts

line_length:
  warning: 110
  error: 160

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 60
  error: 120

nesting:
  type_level:
    warning: 2
    error: 3
  function_level:
    warning: 3
    error: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - to
    - x
    - y
    - z
    - r
    - g
    - b
    - i
    - j
    - n
