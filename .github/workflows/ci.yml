name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Select Xcode
        run: |
          # Pick the newest Xcode 16+ available on the runner.
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build (Debug)
        run: swift build -c debug

      - name: Test (parallel)
        run: swift test --parallel

  app-build:
    # The macOS app target is XcodeGen-generated and NOT covered by
    # `swift build` — app-side breakage (ContentView & friends) used to be
    # caught only on a developer machine (#26). No signing on CI: the build
    # verifies compilation, not distribution.
    name: App Build (macOS)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache xcodebuild SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-xcodebuild-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcodebuild-spm-

      - name: Generate project + build app
        run: |
          set -euo pipefail
          cd apps/ProtelesApp_macOS
          xcodegen generate
          xcodebuild \
            -project ProtelesApp_macOS.xcodeproj \
            -scheme ProtelesApp_macOS \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            build

  lint:
    name: Lint & Format
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install pinned linters
        env:
          SWIFTLINT_VERSION: "0.63.3"
          SWIFTFORMAT_VERSION: "0.61.1"
        run: |
          set -euo pipefail
          # Pin to the versions developers run locally, so lint/format rules
          # don't drift when Homebrew ships a new release — that drift is pure CI
          # noise (a new rule firing with no code change). Prebuilt release
          # binaries, so no source compile. The Swift/Xcode toolchain is
          # deliberately NOT pinned (see "Select Xcode") — toolchain drift is real
          # signal we want CI to flag early, unlike linter drift.
          mkdir -p "$RUNNER_TEMP/linters/swiftlint" "$RUNNER_TEMP/linters/swiftformat"
          curl -fsSL -o "$RUNNER_TEMP/swiftlint.zip" \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          unzip -o -q "$RUNNER_TEMP/swiftlint.zip" -d "$RUNNER_TEMP/linters/swiftlint"
          curl -fsSL -o "$RUNNER_TEMP/swiftformat.zip" \
            "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          unzip -o -q "$RUNNER_TEMP/swiftformat.zip" -d "$RUNNER_TEMP/linters/swiftformat"
          chmod +x "$RUNNER_TEMP/linters/swiftlint/swiftlint" "$RUNNER_TEMP/linters/swiftformat/swiftformat"
          # Prepend to PATH for the following steps (GITHUB_PATH takes precedence).
          echo "$RUNNER_TEMP/linters/swiftlint" >> "$GITHUB_PATH"
          echo "$RUNNER_TEMP/linters/swiftformat" >> "$GITHUB_PATH"

      - name: Linter versions
        run: |
          swiftlint --version
          swiftformat --version

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

      - name: SwiftLint (strict)
        run: swiftlint --strict --quiet

  vendor-check:
    # The dinv/leveldb plugins the app SHIPS live under
    # Sources/MudCore/Resources/, vendored from the plugins/ submodules. This
    # job fails if those shipped copies drift from the pinned submodules + the
    # local-edit patches (GitHub #67). Pure bash/git/diff — no macOS toolchain
    # needed, and it only fetches the two small plugin submodules (not the large
    # reference clients).
    name: Vendored plugins in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Check out the vendored plugin submodules
        run: git submodule update --init plugins/dinv plugins/leveldb

      - name: Verify shipped copies match submodules + patches
        run: scripts/vendor-plugins.sh --check
