name: ProtelesApp_macOS
options:
  bundleIdPrefix: com.proteles
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES

packages:
  Proteles:
    path: ../..
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

targets:
  ProtelesApp_macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Proteles
        CFBundleName: Proteles
        CFBundleShortVersionString: "0.5.0"
        CFBundleVersion: "40"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
        # Sparkle auto-update (#23). INTERIM: feed on GitHub Pages until
        # proteles.net is registered (see docs/plans/AUTOUPDATE_AND_COPYOVER.md);
        # the URL moves to https://proteles.net/appcast.xml before 1.0. The
        # EdDSA public key is permanent — its private half lives only in the
        # release machine's login keychain (never committed). Background daily
        # checks are on; updates download + notify rather than silently install.
        SUFeedURL: https://rodarvus.github.io/proteles/appcast.xml
        SUPublicEDKey: ORb2N04eULmTnO2idxMXKyAhjUylf7l5GC7RO3XWeBE=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUAutomaticallyUpdate: false
    entitlements:
      path: Proteles.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        # Allow the hardened runtime to load our embedded Sparkle.framework.
        # Library Validation otherwise requires every loaded framework to share
        # the app's Team ID; a self-signed dev build has *no* team, so dyld
        # refuses Sparkle ("different Team ID") and the app fails to launch.
        # This is the standard, notarization-safe Sparkle entitlement (we only
        # load frameworks we embed + sign ourselves). (#23)
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - package: Proteles
        product: MudCore
      - package: Proteles
        product: MudUI
      - package: Proteles
        product: MudOutputView_macOS
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proteles.ProtelesApp
        PRODUCT_NAME: Proteles
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "40"
        # Xcode 16's "debug dylib" split (a thin launcher loading
        # Proteles.debug.dylib) can sign the two halves with mismatched Team
        # IDs, so dyld refuses to load the dylib and the dev build crashes at
        # launch ("Library not loaded … different Team IDs"). Disable the split
        # so Debug builds a normal monolithic binary. Release is unaffected.
        ENABLE_DEBUG_DYLIB: NO
        # Sign with a stable, self-signed dev identity so the Keychain
        # remembers "Always Allow" across rebuilds (ad-hoc builds have no
        # stable identity and re-prompt every time). Run
        # scripts/create-dev-signing-cert.sh once to create it; releases
        # will switch to a real Developer ID. CODE_SIGN_INJECT_BASE_ENTITLEMENTS
        # is NO so the build isn't marked debuggable (get-task-allow), which
        # also makes the Keychain trust the grant.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Proteles Dev"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        COMBINE_HIDPI_IMAGES: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
