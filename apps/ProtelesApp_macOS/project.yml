name: ProtelesApp_macOS
options:
  bundleIdPrefix: com.proteles
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES

packages:
  Proteles:
    path: ../..

targets:
  ProtelesApp_macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Proteles
        CFBundleName: Proteles
        CFBundleShortVersionString: "0.4.4"
        CFBundleVersion: "32"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
    entitlements:
      path: Proteles.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    dependencies:
      - package: Proteles
        product: MudCore
      - package: Proteles
        product: MudUI
      - package: Proteles
        product: MudOutputView_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proteles.ProtelesApp
        PRODUCT_NAME: Proteles
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.4.4"
        CURRENT_PROJECT_VERSION: "30"
        # Sign with a stable, self-signed dev identity so the Keychain
        # remembers "Always Allow" across rebuilds (ad-hoc builds have no
        # stable identity and re-prompt every time). Run
        # scripts/create-dev-signing-cert.sh once to create it; releases
        # will switch to a real Developer ID. CODE_SIGN_INJECT_BASE_ENTITLEMENTS
        # is NO so the build isn't marked debuggable (get-task-allow), which
        # also makes the Keychain trust the grant.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Proteles Dev"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        COMBINE_HIDPI_IMAGES: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
